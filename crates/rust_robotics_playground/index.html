<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RustRobotics Playground</title>
  <meta name="description" content="Interactive grid planners (A*, Dijkstra, JPS, Theta*) running in your browser via Rust/WASM.">
  <link rel="icon" href="data:,">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111318;
      color: #e8ecf1;
      font-family: system-ui, sans-serif;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      gap: 0.75rem;
      pointer-events: none;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading RustRobotics Playground…</div>
  <canvas id="rust_robotics_playground"></canvas>
  <link data-trunk rel="rust" data-bin="rust_robotics_playground" data-wasm-opt="z" />
  <script>
    window.addEventListener("load", () => {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.remove();
      }
    });
  </script>
</body>
</html>
