<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" role="img" aria-labelledby="title desc">
<title id="title">Hierarchical MAPF region-size sweep</title>
<desc id="desc">Repair-group size and planning time as the coarse region granularity grows on a fixed scene of 6 local swaps.</desc>
<rect width="760" height="470" fill="#f8fafc"/>
<text x="54" y="44" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Hierarchical MAPF region-size sweep</text>
<text x="54" y="70" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Coarser regions merge agents into larger CBS repair groups.</text>
<line x1="84" y1="342" x2="616" y2="342" stroke="#475569" stroke-width="1.5"/>
<line x1="84" y1="128" x2="84" y2="342" stroke="#475569" stroke-width="1.5"/>
<text x="350" y="392" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">region size</text>
<text x="26" y="236" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" transform="rotate(-90 26 236)">max repair-group size</text>
<rect x="127.5" y="306.3" width="46" height="35.7" rx="4" fill="#2563eb" opacity="0.86"/>
<text x="150.5" y="297.3" text-anchor="middle" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="12">2</text>
<text x="150.5" y="365" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">4x4</text>
<circle cx="150.5" cy="340.7" r="6.5" fill="#f97316" stroke="#ffffff" stroke-width="2"/>
<rect x="260.5" y="270.7" width="46" height="71.3" rx="4" fill="#2563eb" opacity="0.86"/>
<text x="283.5" y="261.7" text-anchor="middle" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="12">4</text>
<text x="283.5" y="365" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">8x8</text>
<circle cx="283.5" cy="339.7" r="6.5" fill="#f97316" stroke="#ffffff" stroke-width="2"/>
<rect x="393.5" y="235.0" width="46" height="107.0" rx="4" fill="#2563eb" opacity="0.86"/>
<text x="416.5" y="226.0" text-anchor="middle" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="12">6</text>
<text x="416.5" y="365" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">12x12</text>
<circle cx="416.5" cy="336.1" r="6.5" fill="#f97316" stroke="#ffffff" stroke-width="2"/>
<rect x="526.5" y="128.0" width="46" height="214.0" rx="4" fill="#2563eb" opacity="0.86"/>
<text x="549.5" y="119.0" text-anchor="middle" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="12">12</text>
<text x="549.5" y="365" text-anchor="middle" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">24x24</text>
<circle cx="549.5" cy="128.0" r="6.5" fill="#f97316" stroke="#ffffff" stroke-width="2"/>
<polyline points="150.5,340.7 283.5,339.7 416.5,336.1 549.5,128.0" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="634" y="126" width="12" height="12" rx="2" fill="#2563eb"/>
<text x="654" y="136" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">max group</text>
<circle cx="640" cy="160" r="6" fill="#f97316"/>
<text x="654" y="164" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">time (ms)</text>
<rect x="634" y="180" width="12" height="12" rx="2" fill="#dc2626"/>
<text x="654" y="190" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">fallback</text>
<text x="54" y="430" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">Fixed seed scene; bars turn red if the global full-CBS fallback fired.</text>
</svg>
