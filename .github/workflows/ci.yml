name: CI

on:
  push:
    branches: [ main, dev/*, feat/*, task/* ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}

    - name: Build workspace
      run: cargo build --workspace --lib --tests --examples

    - name: Run workspace tests
      run: cargo test --workspace --lib --tests

    - name: Run headless tests (no default features)
      run: |
        cargo test -p rust_robotics_core --no-default-features
        cargo test -p rust_robotics_planning --no-default-features --lib --tests
        cargo test -p rust_robotics_localization --no-default-features --lib --tests
        cargo test -p rust_robotics_control --no-default-features --lib --tests
        cargo test -p rust_robotics_mapping --no-default-features --lib --tests
        cargo test -p rust_robotics_slam --no-default-features --lib --tests

    - name: Run headless examples
      run: |
        cargo run -p rust_robotics --example headless_grid_planners --features planning
        cargo run -p rust_robotics --example headless_localizers --features localization
        cargo run -p rust_robotics --example headless_navigation_loop --features "planning,localization,control"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}

    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -W clippy::all -D warnings

    - name: Rustdoc warnings
      run: cargo doc --workspace --no-deps
      env:
        RUSTDOCFLAGS: "-D warnings"

    - name: Check formatting
      run: cargo fmt --all -- --check

  deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo-deny
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-deny
        key: ${{ runner.os }}-cargo-deny-0.16

    - name: Install cargo-deny
      run: command -v cargo-deny || cargo install cargo-deny --locked

    - name: Dependency audit
      run: cargo deny check

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo-tarpaulin
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-tarpaulin
        key: ${{ runner.os }}-tarpaulin-0.31

    - name: Install cargo-tarpaulin
      run: command -v cargo-tarpaulin || cargo install cargo-tarpaulin --locked

    - name: Run coverage
      run: cargo tarpaulin --workspace --skip-clean --timeout 600 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: cobertura.xml
        fail_ci_if_error: false

  semver:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4

    - name: Check semver compliance
      uses: obi1kenobi/cargo-semver-checks-action@v2
