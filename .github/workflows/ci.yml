name: CI

on:
  push:
    branches: [ main, dev/*, feat/*, task/* ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  all-targets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}

    - name: Build workspace
      run: cargo build --workspace --all-targets --verbose

    - name: Run workspace tests
      run: cargo test --workspace --all-targets

    - name: Run headless tests (no default features)
      run: cargo test --workspace --no-default-features

    - name: Run headless examples
      run: |
        cargo run -p rust_robotics --example headless_grid_planners --features planning
        cargo run -p rust_robotics --example headless_localizers --features localization
        cargo run -p rust_robotics --example headless_navigation_loop --features "planning,localization,control"

    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -W clippy::all -D warnings

    - name: Rustdoc warnings
      run: cargo doc --workspace --no-deps
      env:
        RUSTDOCFLAGS: "-D warnings"

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Install cargo-deny
      run: cargo install cargo-deny --locked

    - name: Dependency audit
      run: cargo deny check

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin --locked

    - name: Run coverage
      run: cargo tarpaulin --workspace --skip-clean --timeout 300 --out xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: cobertura.xml
        fail_ci_if_error: false
