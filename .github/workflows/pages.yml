name: Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-pages-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}

    - name: Install trunk
      run: command -v trunk || cargo install trunk --locked

    - name: Build playground WASM
      working-directory: crates/rust_robotics_playground
      run: trunk build index.html --release --public-url /rust_robotics/playground/
      env:
        RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        NO_COLOR: "false"

    - name: Build API docs
      run: cargo doc --workspace --no-deps --exclude rust_robotics_playground

    - name: Build static artifact
      run: |
        rm -rf _site
        mkdir -p _site
        cp -R docs/. _site/
        cp -R img _site/img
        cp -R crates/rust_robotics_playground/dist/. _site/playground/
        cp -R target/doc _site/api

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
